<!DOCTYPE html>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
>
  <h:head>
    <meta charset="UTF-8" />
    <title>Like Hero To Zero - CO2 Emissionen</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0fdf4;
      }
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: white;
        padding: 15px 30px;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header a {
        color: #10b981;
        text-decoration: none;
        font-size: 1.2em;
        font-weight: 700;
        transition: color 0.3s;
      }
      .header a:hover {
        color: #059669;
      }
      .login-link a {
        padding: 12px 24px !important;
        font-size: 1em !important;
        width: auto !important;
        border-radius: 8px !important;
        background: #10b981;
        color: white !important;
        text-decoration: none;
        font-weight: 700;
        transition: background 0.3s;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        display: inline-block;
      }
      .login-link a:hover {
        background: #059669;
      }
      .container {
        max-width: 800px;
        margin: 100px auto 40px;
        background: white;
        padding: 30px;
        border-radius: 10px;
      }
      h1 {
        color: #2d5016;
      }
      .form-group {
        margin-bottom: 25px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #4a5568;
        font-weight: 600;
        font-size: 0.95em;
      }
      select,
      input[type="text"] {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
        background: #f7fafc;
      }
      select:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      .container button {
        padding: 18px 24px !important;
        border-radius: 8px !important;
        font-size: 18px !important;
      }
      input[type="submit"],
      button {
        padding: 18px 24px;
        background: #10b981 !important;
        color: white !important;
        border: none !important;
        border-radius: 8px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }
      input[type="submit"]:hover,
      button:hover {
        background: linear-gradient(
          135deg,
          #059669 0%,
          #047857 100%
        ) !important;
      }
      .result {
        margin-top: 30px;
        padding: 25px;
        background: linear-gradient(135deg, #f6f8fb 0%, #e9f0f5 100%);
        border-radius: 15px;
        border-left: 5px solid #667eea;
      }
      .result h2 {
        color: #2d3748;
        margin-bottom: 15px;
        font-size: 1.5em;
      }
      .result p {
        color: #4a5568;
        margin: 10px 0;
        font-size: 1.1em;
      }
      .result strong {
        color: #2d3748;
      }
      .no-result {
        color: #e53e3e;
        text-align: center;
        padding: 20px;
        background: #fff5f5;
        border-radius: 10px;
        margin-top: 20px;
      }
      .error {
        color: #e53e3e;
        font-size: 0.9em;
        margin-top: 5px;
      }
    </style>
  </h:head>
  <h:body>
    <div class="header">
      <h:link value="Like Hero To Zero" outcome="index" />
      <div class="login-link">
        <h:link value="Anmelden" outcome="login" />
      </div>
    </div>
    <div class="container">
      <h1>Aktuelle CO2-Emissionsdaten weltweit</h1>
      <h:form>
        <div class="form-group">
          <h:outputLabel
            value="Wählen Sie Ihre Staatsbürgerschaft:"
            for="country"
          />
          <h:selectOneMenu
            id="country"
            value="#{publicViewBean.selectedCountry}"
            required="true"
            requiredMessage="Bitte wählen Sie ein Land aus"
          >
            <f:selectItem
              itemLabel="-- Bitte wählen --"
              itemValue=""
              noSelectionOption="true"
            />

            <f:selectItem
              itemLabel="━━━ EUROPA ━━━"
              itemValue=""
              itemDisabled="true"
            />
            <f:selectItem itemLabel="Albanien" itemValue="Albanien" />
            <f:selectItem itemLabel="Belgien" itemValue="Belgien" />
            <f:selectItem itemLabel="Bulgarien" itemValue="Bulgarien" />
            <f:selectItem itemLabel="Dänemark" itemValue="Dänemark" />
            <f:selectItem itemLabel="Deutschland" itemValue="Deutschland" />
            <f:selectItem itemLabel="Estland" itemValue="Estland" />
            <f:selectItem itemLabel="Finnland" itemValue="Finnland" />
            <f:selectItem itemLabel="Frankreich" itemValue="Frankreich" />
            <f:selectItem itemLabel="Griechenland" itemValue="Griechenland" />
            <f:selectItem itemLabel="Irland" itemValue="Irland" />
            <f:selectItem itemLabel="Island" itemValue="Island" />
            <f:selectItem itemLabel="Italien" itemValue="Italien" />
            <f:selectItem itemLabel="Kroatien" itemValue="Kroatien" />
            <f:selectItem itemLabel="Lettland" itemValue="Lettland" />
            <f:selectItem itemLabel="Litauen" itemValue="Litauen" />
            <f:selectItem itemLabel="Luxemburg" itemValue="Luxemburg" />
            <f:selectItem itemLabel="Malta" itemValue="Malta" />
            <f:selectItem itemLabel="Niederlande" itemValue="Niederlande" />
            <f:selectItem itemLabel="Norwegen" itemValue="Norwegen" />
            <f:selectItem itemLabel="Österreich" itemValue="Österreich" />
            <f:selectItem itemLabel="Polen" itemValue="Polen" />
            <f:selectItem itemLabel="Portugal" itemValue="Portugal" />
            <f:selectItem itemLabel="Rumänien" itemValue="Rumänien" />
            <f:selectItem itemLabel="Russland" itemValue="Russland" />
            <f:selectItem itemLabel="Schweden" itemValue="Schweden" />
            <f:selectItem itemLabel="Schweiz" itemValue="Schweiz" />
            <f:selectItem itemLabel="Serbien" itemValue="Serbien" />
            <f:selectItem itemLabel="Slowakei" itemValue="Slowakei" />
            <f:selectItem itemLabel="Slowenien" itemValue="Slowenien" />
            <f:selectItem itemLabel="Spanien" itemValue="Spanien" />
            <f:selectItem itemLabel="Tschechien" itemValue="Tschechien" />
            <f:selectItem itemLabel="Ukraine" itemValue="Ukraine" />
            <f:selectItem itemLabel="Ungarn" itemValue="Ungarn" />
            <f:selectItem
              itemLabel="Vereinigtes Königreich"
              itemValue="Vereinigtes Königreich"
            />

            <f:selectItem
              itemLabel="━━━ ASIEN ━━━"
              itemValue=""
              itemDisabled="true"
            />
            <f:selectItem itemLabel="Afghanistan" itemValue="Afghanistan" />
            <f:selectItem itemLabel="Bangladesch" itemValue="Bangladesch" />
            <f:selectItem itemLabel="China" itemValue="China" />
            <f:selectItem itemLabel="Indien" itemValue="Indien" />
            <f:selectItem itemLabel="Indonesien" itemValue="Indonesien" />
            <f:selectItem itemLabel="Irak" itemValue="Irak" />
            <f:selectItem itemLabel="Iran" itemValue="Iran" />
            <f:selectItem itemLabel="Israel" itemValue="Israel" />
            <f:selectItem itemLabel="Japan" itemValue="Japan" />
            <f:selectItem itemLabel="Jordanien" itemValue="Jordanien" />
            <f:selectItem itemLabel="Kasachstan" itemValue="Kasachstan" />
            <f:selectItem itemLabel="Malaysia" itemValue="Malaysia" />
            <f:selectItem itemLabel="Pakistan" itemValue="Pakistan" />
            <f:selectItem itemLabel="Philippinen" itemValue="Philippinen" />
            <f:selectItem itemLabel="Saudi-Arabien" itemValue="Saudi-Arabien" />
            <f:selectItem itemLabel="Singapur" itemValue="Singapur" />
            <f:selectItem itemLabel="Südkorea" itemValue="Südkorea" />
            <f:selectItem itemLabel="Thailand" itemValue="Thailand" />
            <f:selectItem itemLabel="Türkei" itemValue="Türkei" />
            <f:selectItem
              itemLabel="Vereinigte Arabische Emirate"
              itemValue="Vereinigte Arabische Emirate"
            />
            <f:selectItem itemLabel="Vietnam" itemValue="Vietnam" />

            <f:selectItem
              itemLabel="━━━ AFRIKA ━━━"
              itemValue=""
              itemDisabled="true"
            />
            <f:selectItem itemLabel="Ägypten" itemValue="Ägypten" />
            <f:selectItem itemLabel="Algerien" itemValue="Algerien" />
            <f:selectItem itemLabel="Äthiopien" itemValue="Äthiopien" />
            <f:selectItem itemLabel="Ghana" itemValue="Ghana" />
            <f:selectItem itemLabel="Kenia" itemValue="Kenia" />
            <f:selectItem itemLabel="Marokko" itemValue="Marokko" />
            <f:selectItem itemLabel="Nigeria" itemValue="Nigeria" />
            <f:selectItem itemLabel="Südafrika" itemValue="Südafrika" />
            <f:selectItem itemLabel="Tunesien" itemValue="Tunesien" />

            <f:selectItem
              itemLabel="━━━ NORDAMERIKA ━━━"
              itemValue=""
              itemDisabled="true"
            />
            <f:selectItem itemLabel="Kanada" itemValue="Kanada" />
            <f:selectItem itemLabel="Mexiko" itemValue="Mexiko" />
            <f:selectItem itemLabel="USA" itemValue="USA" />

            <f:selectItem
              itemLabel="━━━ SÜDAMERIKA ━━━"
              itemValue=""
              itemDisabled="true"
            />
            <f:selectItem itemLabel="Argentinien" itemValue="Argentinien" />
            <f:selectItem itemLabel="Brasilien" itemValue="Brasilien" />
            <f:selectItem itemLabel="Chile" itemValue="Chile" />
            <f:selectItem itemLabel="Kolumbien" itemValue="Kolumbien" />
            <f:selectItem itemLabel="Peru" itemValue="Peru" />
            <f:selectItem itemLabel="Venezuela" itemValue="Venezuela" />

            <f:selectItem
              itemLabel="━━━ OZEANIEN ━━━"
              itemValue=""
              itemDisabled="true"
            />
            <f:selectItem itemLabel="Australien" itemValue="Australien" />
            <f:selectItem itemLabel="Neuseeland" itemValue="Neuseeland" />
          </h:selectOneMenu>
          <h:message for="country" styleClass="error" />
        </div>

        <div class="form-group">
          <h:outputLabel
            value="Jahr (optional - leer lassen für aktuellste Daten):"
            for="year"
          />
          <h:selectOneMenu id="year" value="#{publicViewBean.selectedYear}">
            <f:selectItem
              itemLabel="-- Aktuellste Daten --"
              itemValue="#{null}"
            />
            <f:selectItem itemLabel="2025" itemValue="2025" />
            <f:selectItem itemLabel="2024" itemValue="2024" />
            <f:selectItem itemLabel="2023" itemValue="2023" />
            <f:selectItem itemLabel="2022" itemValue="2022" />
            <f:selectItem itemLabel="2021" itemValue="2021" />
            <f:selectItem itemLabel="2020" itemValue="2020" />
            <f:selectItem itemLabel="2019" itemValue="2019" />
            <f:selectItem itemLabel="2018" itemValue="2018" />
            <f:selectItem itemLabel="2017" itemValue="2017" />
            <f:selectItem itemLabel="2016" itemValue="2016" />
            <f:selectItem itemLabel="2015" itemValue="2015" />
            <f:selectItem itemLabel="2014" itemValue="2014" />
            <f:selectItem itemLabel="2013" itemValue="2013" />
            <f:selectItem itemLabel="2012" itemValue="2012" />
            <f:selectItem itemLabel="2011" itemValue="2011" />
            <f:selectItem itemLabel="2010" itemValue="2010" />
          </h:selectOneMenu>
        </div>

        <h:commandButton
          value="CO2-Daten anzeigen"
          action="#{publicViewBean.searchCountry}"
        />
      </h:form>

      <h:panelGroup rendered="#{publicViewBean.emission != null}">
        <div class="result">
          <h2>Daten für #{publicViewBean.emission.country}</h2>
          <p><strong>Jahr:</strong> #{publicViewBean.emission.year}</p>
          <p>
            <strong>CO2-Ausstoß:</strong> #{publicViewBean.emission.emissionsKt}
            kt
          </p>
        </div>
      </h:panelGroup>
      <h:panelGroup
        rendered="#{publicViewBean.emission == null and publicViewBean.selectedCountry != null and publicViewBean.selectedCountry != ''}"
      >
        <div class="no-result">
          <p>
            ❌ Keine Daten für "#{publicViewBean.selectedCountry}"<h:outputText
              value=" im Jahr #{publicViewBean.selectedYear}"
              rendered="#{publicViewBean.selectedYear != null}"
            />
            gefunden.
          </p>
        </div>
      </h:panelGroup>
    </div>
  </h:body>
</html>
