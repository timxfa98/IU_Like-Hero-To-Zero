services:
  mysql:
    image: mysql:8.0
    container_name: herotozero-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: herotozero
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database-setup.sql:/docker-entrypoint-initdb.d/database-setup.sql
    
    healthcheck:  
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  wildfly:
    build: .
    container_name: herotozero-wildfly
    ports:
      - "8080:8080"
      - "9990:9990"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=herotozero
      - DB_USER=root
      - DB_PASSWORD=root

volumes:
  mysql-data:
